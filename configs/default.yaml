# Default configuration for hyperparameter optimization experiments

# Global settings
seed: 42
logging_level: INFO
results_dir: ./results
log_file: null

# Experiment configurations
experiments:
  cifar10_cnn:
    dataset_name: cifar10
    model_name: simple_cnn
    max_epochs: 50
    early_stopping_patience: 10
    direction: maximize
    
    data:
      dataset_name: cifar10
      batch_size: 32
      num_workers: 4
      val_split: 0.2
    
    search_space:
      learning_rate:
        type: loguniform
        low: 0.0001
        high: 0.1
      batch_size:
        type: categorical
        choices: [16, 32, 64, 128]
      optimizer:
        type: categorical
        choices: [adam, sgd, adamw]
      n_filters:
        type: categorical
        choices: [16, 32, 64, 128]
      dropout:
        type: uniform
        low: 0.0
        high: 0.7
      weight_decay:
        type: loguniform
        low: 1e-6
        high: 1e-2
      scheduler:
        type: categorical
        choices: [null, step, cosine, plateau]
    
    algorithms:
      random_search:
        n_trials: 20
        timeout: null
        direction: maximize
      
      optuna_tpe:
        n_trials: 20
        timeout: null
        direction: maximize
        sampler: tpe
        pruner: median
      
      hyperband:
        n_trials: 50
        timeout: null
        direction: maximize
        max_budget: 30
        eta: 3
        min_budget: 1

  synthetic_mlp:
    dataset_name: synthetic
    model_name: mlp
    max_epochs: 30
    early_stopping_patience: 5
    direction: maximize
    
    data:
      dataset_name: synthetic
      batch_size: 32
      num_workers: 4
      val_split: 0.2
      n_samples: 1000
      n_features: 20
      n_classes: 2
      task_type: classification
    
    search_space:
      learning_rate:
        type: loguniform
        low: 0.0001
        high: 0.1
      batch_size:
        type: categorical
        choices: [16, 32, 64]
      optimizer:
        type: categorical
        choices: [adam, sgd]
      hidden_sizes:
        type: categorical
        choices: [[64], [128], [64, 32], [128, 64], [64, 32, 16]]
      dropout:
        type: uniform
        low: 0.0
        high: 0.5
      activation:
        type: categorical
        choices: [relu, tanh, sigmoid]
      weight_decay:
        type: loguniform
        low: 1e-6
        high: 1e-2
    
    algorithms:
      random_search:
        n_trials: 15
        timeout: null
        direction: maximize
      
      grid_search:
        n_trials: null
        timeout: null
        direction: maximize
      
      optuna_tpe:
        n_trials: 15
        timeout: null
        direction: maximize
        sampler: tpe
        pruner: median

  cifar10_resnet:
    dataset_name: cifar10
    model_name: resnet
    max_epochs: 100
    early_stopping_patience: 15
    direction: maximize
    
    data:
      dataset_name: cifar10
      batch_size: 32
      num_workers: 4
      val_split: 0.2
    
    search_space:
      learning_rate:
        type: loguniform
        low: 0.0001
        high: 0.1
      batch_size:
        type: categorical
        choices: [32, 64, 128]
      optimizer:
        type: categorical
        choices: [adam, sgd, adamw]
      n_blocks:
        type: categorical
        choices: [1, 2, 3, 4]
      base_channels:
        type: categorical
        choices: [32, 64, 128]
      weight_decay:
        type: loguniform
        low: 1e-6
        high: 1e-2
      scheduler:
        type: categorical
        choices: [null, cosine, plateau]
    
    algorithms:
      optuna_tpe:
        n_trials: 30
        timeout: null
        direction: maximize
        sampler: tpe
        pruner: median
      
      hyperband:
        n_trials: 100
        timeout: null
        direction: maximize
        max_budget: 50
        eta: 3
        min_budget: 5
      
      bohb:
        n_trials: 100
        timeout: null
        direction: maximize
        sampler: tpe
        pruner: hyperband
