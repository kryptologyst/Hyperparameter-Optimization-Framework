name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.10, 3.11, 3.12]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Lint with ruff
      run: |
        ruff check src/ tests/ scripts/
    
    - name: Format check with black
      run: |
        black --check src/ tests/ scripts/
    
    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  smoke-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
    
    - name: Run smoke test
      run: |
        python -c "
        from src.hpo import HPOFramework
        from omegaconf import OmegaConf
        import tempfile
        import yaml
        
        # Create minimal config
        config = {
            'seed': 42,
            'logging_level': 'WARNING',
            'experiments': {
                'smoke_test': {
                    'dataset_name': 'synthetic',
                    'model_name': 'mlp',
                    'max_epochs': 1,
                    'early_stopping_patience': 1,
                    'data': {
                        'dataset_name': 'synthetic',
                        'batch_size': 16,
                        'num_workers': 0,
                        'val_split': 0.2,
                        'n_samples': 50,
                        'n_features': 5,
                        'n_classes': 2,
                        'task_type': 'classification'
                    },
                    'search_space': {
                        'learning_rate': {'type': 'categorical', 'choices': [0.01]},
                        'batch_size': {'type': 'categorical', 'choices': [16]},
                        'optimizer': {'type': 'categorical', 'choices': ['adam']},
                        'hidden_sizes': {'type': 'categorical', 'choices': [[16]]},
                        'dropout': {'type': 'categorical', 'choices': [0.0]},
                        'activation': {'type': 'categorical', 'choices': ['relu']}
                    },
                    'algorithms': {
                        'random_search': {
                            'n_trials': 2,
                            'timeout': None,
                            'direction': 'maximize'
                        }
                    }
                }
            }
        }
        
        # Save config to temp file
        with tempfile.NamedTemporaryFile(mode='w', suffix='.yaml', delete=False) as f:
            yaml.dump(config, f)
            config_path = f.name
        
        # Load and run framework
        config_obj = OmegaConf.load(config_path)
        framework = HPOFramework(config_obj)
        
        # Run smoke test
        results = framework.run_experiment('smoke_test')
        print('✅ Smoke test passed!')
        print(f'Best score: {results[\"leaderboard\"][0][\"best_score\"]:.4f}')
        "
    
    - name: Test demo app import
      run: |
        python -c "
        import sys
        sys.path.append('demo')
        try:
            import app
            print('✅ Demo app imports successfully')
        except ImportError as e:
            print(f'❌ Demo app import failed: {e}')
            sys.exit(1)
        "

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: 3.10
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Run safety check
      run: |
        safety check --file requirements.txt || true
    
    - name: Run bandit security scan
      run: |
        bandit -r src/ -f json -o bandit-report.json || true
        bandit -r src/ || true
